<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokedex</title>
    <link rel="stylesheet" href="/public/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <h1 class="logo">Pokedex</h1>
                <nav class="nav" id="nav">
                    <a href="#" class="nav-link active" data-section="pokemons">Pokemons</a>
                    <a href="#" class="nav-link" data-section="favorites">Favoris</a>
                    <a href="#" class="nav-link" data-section="teams">Equipes</a>
                    <a href="#" class="nav-link" data-section="stats">Stats</a>
                </nav>
                <div class="auth-section" id="authSection">
                    <button class="btn btn-secondary" id="loginBtn">Connexion</button>
                    <button class="btn btn-primary" id="registerBtn">Inscription</button>
                </div>
                <div class="user-section hidden" id="userSection">
                    <span class="username" id="usernameDisplay"></span>
                    <button class="btn btn-secondary" id="logoutBtn">Deconnexion</button>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Pokemon Section -->
            <section class="section active" id="pokemonsSection">
                <div class="section-header">
                    <h2>Tous les Pokemons</h2>
                    <div class="filters">
                        <input type="text" class="search-input" id="searchInput" placeholder="Rechercher un Pokemon...">
                        <select class="select-input" id="typeFilter">
                            <option value="">Tous les types</option>
                            <option value="Normal">Normal</option>
                            <option value="Fire">Feu</option>
                            <option value="Water">Eau</option>
                            <option value="Electric">Electrik</option>
                            <option value="Grass">Plante</option>
                            <option value="Ice">Glace</option>
                            <option value="Fighting">Combat</option>
                            <option value="Poison">Poison</option>
                            <option value="Ground">Sol</option>
                            <option value="Flying">Vol</option>
                            <option value="Psychic">Psy</option>
                            <option value="Bug">Insecte</option>
                            <option value="Rock">Roche</option>
                            <option value="Ghost">Spectre</option>
                            <option value="Dragon">Dragon</option>
                            <option value="Dark">Tenebre</option>
                            <option value="Steel">Acier</option>
                            <option value="Fairy">Fee</option>
                        </select>
                    </div>
                </div>
                <div class="pokemon-grid" id="pokemonGrid"></div>
                <div class="pagination" id="pagination"></div>
            </section>

            <!-- Favorites Section -->
            <section class="section" id="favoritesSection">
                <div class="section-header">
                    <h2>Mes Favoris</h2>
                </div>
                <div class="auth-required hidden" id="favoritesAuth">
                    <p>Connectez-vous pour voir vos favoris</p>
                </div>
                <div class="pokemon-grid" id="favoritesGrid"></div>
            </section>

            <!-- Teams Section -->
            <section class="section" id="teamsSection">
                <div class="section-header">
                    <h2>Mes Equipes</h2>
                    <button class="btn btn-primary" id="createTeamBtn">Nouvelle equipe</button>
                </div>
                <div class="auth-required hidden" id="teamsAuth">
                    <p>Connectez-vous pour gerer vos equipes</p>
                </div>
                <div class="teams-list" id="teamsList"></div>
            </section>

            <!-- Stats Section -->
            <section class="section" id="statsSection">
                <div class="section-header">
                    <h2>Statistiques</h2>
                </div>
                <div class="stats-container" id="statsContainer"></div>
            </section>
        </main>

        <!-- Pokemon Detail Modal -->
        <div class="modal hidden" id="pokemonModal">
            <div class="modal-overlay"></div>
            <div class="modal-content">
                <button class="modal-close" id="closeModal">&times;</button>
                <div class="pokemon-detail" id="pokemonDetail"></div>
            </div>
        </div>

        <!-- Auth Modal -->
        <div class="modal hidden" id="authModal">
            <div class="modal-overlay"></div>
            <div class="modal-content auth-modal-content">
                <button class="modal-close" id="closeAuthModal">&times;</button>
                <h2 id="authModalTitle">Connexion</h2>
                <form id="authForm">
                    <div class="form-group">
                        <label for="authUsername">Nom d'utilisateur</label>
                        <input type="text" id="authUsername" required>
                    </div>
                    <div class="form-group">
                        <label for="authPassword">Mot de passe</label>
                        <input type="password" id="authPassword" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-full" id="authSubmitBtn">Se connecter</button>
                </form>
                <p class="auth-error hidden" id="authError"></p>
            </div>
        </div>

        <!-- Team Modal -->
        <div class="modal hidden" id="teamModal">
            <div class="modal-overlay"></div>
            <div class="modal-content team-modal-content">
                <button class="modal-close" id="closeTeamModal">&times;</button>
                <h2 id="teamModalTitle">Nouvelle equipe</h2>
                <form id="teamForm">
                    <div class="form-group">
                        <label for="teamName">Nom de l'equipe</label>
                        <input type="text" id="teamName" required>
                    </div>
                    <div class="form-group">
                        <label>Pokemons (selectionnez jusqu'a 6)</label>
                        <div class="pokemon-selector" id="pokemonSelector"></div>
                    </div>
                    <button type="submit" class="btn btn-primary btn-full" id="teamSubmitBtn">Creer l'equipe</button>
                </form>
            </div>
        </div>
    </div>

    <script src="/public/js/app.js"></script>
</body>
</html>
